<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B2B"/>
      <stop offset="100%" style="stop-color:#ff8c5a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(255,107,43,0.4)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="950" cy="100" r="200" fill="rgba(255,107,43,0.05)"/>
  <circle cx="1050" cy="500" r="150" fill="rgba(255,107,43,0.05)"/>
  <circle cx="100" cy="500" r="180" fill="rgba(255,107,43,0.04)"/>
  
  <!-- Orange accent block -->
  <rect x="60" y="60" width="8" height="120" rx="4" fill="#FF6B2B"/>
  
  <!-- Logo -->
  <text x="88" y="140" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" letter-spacing="-3">
    <tspan fill="#FF6B2B">V</tspan><tspan fill="#ffffff">FES</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="88" y="190" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)" letter-spacing="4">ДОСТАВКА ЕДЫ · ТАЛАС · КЫРГЫЗСТАН</text>
  
  <!-- Main text -->
  <text x="88" y="290" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Заказывай еду из лучших</text>
  <text x="88" y="355" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">ресторанов <tspan fill="#FF6B2B">Таласа</tspan></text>
  
  <!-- Features -->
  <rect x="88" y="410" width="220" height="56" rx="28" fill="rgba(255,107,43,0.15)" stroke="#FF6B2B" stroke-width="1.5"/>
  <text x="198" y="444" font-family="Arial, sans-serif" font-size="18" fill="#FF6B2B" text-anchor="middle" font-weight="600">Без наценок</text>
  
  <rect x="328" y="410" width="200" height="56" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="428" y="444" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">Быстрая доставка</text>
  
  <rect x="548" y="410" width="200" height="56" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="648" y="444" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">Онлайн оплата</text>
  
  <!-- URL -->
  <text x="88" y="560" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.35)">vfestalas.vercel.app</text>
  
  <!-- Phone mockup decoration -->
  <rect x="820" y="80" width="320" height="500" rx="36" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <rect x="840" y="110" width="280" height="440" rx="24" fill="rgba(255,107,43,0.08)"/>
  
  <!-- Mock app content -->
  <rect x="860" y="140" width="240" height="40" rx="8" fill="rgba(255,107,43,0.3)"/>
  <text x="980" y="166" font-family="Arial, sans-serif" font-size="14" fill="#FF6B2B" text-anchor="middle" font-weight="700">VFES</text>
  
  <rect x="860" y="200" width="112" height="100" rx="12" fill="rgba(255,255,255,0.08)"/>
  <text x="916" y="258" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">🍕</text>
  
  <rect x="988" y="200" width="112" height="100" rx="12" fill="rgba(255,255,255,0.08)"/>
  <text x="1044" y="258" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">🍣</text>
  
  <rect x="860" y="316" width="240" height="60" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="980" y="352" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Маргарита · 350 сом</text>
  
  <rect x="860" y="392" width="240" height="60" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="980" y="428" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Ролл Калифорния · 420 сом</text>
  
  <rect x="880" y="480" width="200" height="44" rx="22" fill="url(#card)"/>
  <text x="980" y="508" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="700">Заказать</text>
</svg>